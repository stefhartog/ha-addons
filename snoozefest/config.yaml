name: "Snoozefest"
description: "Local alarm and timer service with Home Assistant MQTT discovery"
version: "0.1.24"
slug: "snoozefest"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - i386
services:
  - mqtt:need
map:
  - config:rw
startup: system
boot: auto
options:
  mqtt_username: mqtt
  mqtt_password: password
  timer_add_seconds: 60
schema:
  mqtt_username: str
  mqtt_password: str
  timer_add_seconds: int
